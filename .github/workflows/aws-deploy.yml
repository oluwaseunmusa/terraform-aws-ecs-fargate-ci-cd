name: Terraform AWS Deploy

on:
  pull_request:
    branches: [main] # Trigger on pull requests to the main branch, PR validation (blocks merge)
  push:
    branches: [main] # Trigger on pushes to the main branch, Deploy only on main

jobs:
  checkov-scan:
    if: github.event_name == 'pull_request' # Run Checkov scan only for pull requests, ensuring that we are not blocking deployments on pushes to main
    runs-on: ubuntu-latest
    # Granting permissions for security events and contents is necessary for uploading SARIF results to the GitHub Security tab.
    permissions:
      security-events: write  # Required for SARIF upload
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - name: Test with checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          frameworks: terraform
          output_format: sarif      #  Generates SARIF natively
          output_file_path: checkov-results.sarif

      # Upload SARIF results to GitHub Security tab
      - name: Upload Checkov SARIF results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: checkov-results.sarif

  terraform-plan:
    name: Terraform Deploy ECS Cluster
    needs: checkov-scan # Only runs after Checkov passes
    if: github.ref == 'refs/heads/main' # Only run on pushes to main, ensuring that we are not deploying on pull requests
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
      # - name: Terraoform Destroy
      #   run: terraform destroy -auto-approve